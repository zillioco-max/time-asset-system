<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間資產系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #9C6B6B;
  --rose-light: #C4958F;
  --rose-pale: #F2E8E6;
  --rose-dark: #6B4545;
  --cream: #FAF7F4;
  --ink: #2C2018;
  --ink-light: #6B5B4E;
  --gold: #C4A882;
  --gold-light: #EDE0CC;
  --mint: #7BA89A;
  --sand: #D4C4B0;
  --white: #FFFFFF;
  --c-acc: #4D8B7A;
  --c-run: #8B7A4D;
  --c-rest: #4D6B8B;
  --c-leak: #8B4D4D;
  --sidebar: 240px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; display:flex; }

/* Sidebar */
#sidebar {
  width:var(--sidebar); min-height:100vh; background:var(--ink);
  display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:100;
}
#sidebar-header { padding:24px 18px 18px; border-bottom:1px solid rgba(255,255,255,0.08); }
#sidebar-header h1 { font-family:'Noto Serif TC',serif; font-size:15px; color:var(--gold); letter-spacing:0.1em; line-height:1.4; }
#sidebar-header p { font-size:11px; color:rgba(255,255,255,0.3); margin-top:4px; }
#nav { padding:12px 0; flex:1; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:11px 18px;
  cursor:pointer; color:rgba(255,255,255,0.45); font-size:13px; letter-spacing:0.04em;
  transition:all 0.18s; border-left:2px solid transparent;
}
.nav-item:hover { color:var(--gold-light); background:rgba(255,255,255,0.04); }
.nav-item.active { color:var(--gold); border-left-color:var(--gold); background:rgba(196,168,130,0.08); }
.nav-icon { font-size:15px; width:20px; text-align:center; }

/* API Key setup */
#key-section { padding:14px; border-top:1px solid rgba(255,255,255,0.08); }
#key-section label { font-size:10px; color:rgba(255,255,255,0.3); display:block; margin-bottom:6px; letter-spacing:0.05em; }
#key-input {
  width:100%; padding:8px 10px; background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12); border-radius:6px;
  color:#fff; font-size:11px; font-family:'DM Mono',monospace; outline:none;
}
#key-input::placeholder { color:rgba(255,255,255,0.2); }
#btn-save-key {
  width:100%; margin-top:6px; padding:8px; background:var(--rose);
  border:none; border-radius:6px; color:#fff; font-size:12px;
  font-family:'Noto Sans TC',sans-serif; cursor:pointer; transition:background 0.18s;
}
#btn-save-key:hover { background:var(--rose-dark); }
#key-status { font-size:10px; color:rgba(255,255,255,0.3); text-align:center; margin-top:6px; }
#key-status.ok { color:var(--mint); }

/* Main */
#main { margin-left:var(--sidebar); flex:1; min-height:100vh; display:flex; flex-direction:column; }
.page { display:none; flex-direction:column; flex:1; padding:28px 32px; gap:20px; }
.page.active { display:flex; }
.page-title { font-family:'Noto Serif TC',serif; font-size:19px; font-weight:600; color:var(--ink); letter-spacing:0.05em; }
.page-subtitle { font-size:12px; color:var(--ink-light); margin-top:3px; }

/* ── 今日頁 ── */
#today-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.today-card {
  background:var(--white); border-radius:12px; padding:18px 20px;
  border:1px solid var(--sand); box-shadow:0 2px 8px rgba(44,32,24,0.05);
}
.today-card h3 { font-size:12px; color:var(--ink-light); letter-spacing:0.06em; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.today-card h3 span { font-size:14px; }

/* Calendar events */
#cal-list { display:flex; flex-direction:column; gap:8px; }
.cal-event {
  display:flex; align-items:flex-start; gap:10px; padding:10px 12px;
  background:var(--cream); border-radius:8px; border-left:3px solid var(--sand);
}
.cal-event.acc { border-left-color:var(--c-acc); }
.cal-event.run { border-left-color:var(--c-run); }
.cal-event.rest { border-left-color:var(--c-rest); }
.cal-event.leak { border-left-color:var(--c-leak); }
.cal-time { font-size:11px; color:var(--ink-light); font-family:'DM Mono',monospace; white-space:nowrap; padding-top:1px; }
.cal-title { font-size:13px; color:var(--ink); line-height:1.4; }
.cal-empty { font-size:12px; color:var(--sand); text-align:center; padding:20px 0; }

/* Quick schedule */
#quick-sched { display:flex; flex-direction:column; gap:8px; }
.sched-input-row { display:flex; gap:8px; }
.sched-input-row input, .sched-input-row select {
  flex:1; padding:8px 10px; border:1px solid var(--sand); border-radius:6px;
  font-size:12px; font-family:'Noto Sans TC',sans-serif; color:var(--ink);
  background:var(--cream); outline:none;
}
.sched-input-row input:focus, .sched-input-row select:focus { border-color:var(--rose-light); }
#sched-title { flex:2 !important; }
#btn-add-event {
  padding:8px 16px; background:var(--mint); color:#fff; border:none;
  border-radius:6px; font-size:12px; font-family:'Noto Sans TC',sans-serif;
  cursor:pointer; white-space:nowrap; transition:opacity 0.18s;
}
#btn-add-event:hover { opacity:0.82; }
#btn-refresh-cal {
  padding:6px 12px; background:transparent; border:1px solid var(--sand);
  border-radius:6px; font-size:11px; color:var(--ink-light); cursor:pointer;
  font-family:'Noto Sans TC',sans-serif; transition:all 0.15s;
}
#btn-refresh-cal:hover { border-color:var(--rose-light); color:var(--rose); }
#sched-feedback { font-size:12px; color:var(--mint); min-height:18px; }

/* Stats row */
#stats-row { display:flex; gap:12px; }
.stat-chip {
  flex:1; background:var(--white); border-radius:10px; padding:14px 16px;
  border:1px solid var(--sand); text-align:center;
}
.stat-num { font-family:'Noto Serif TC',serif; font-size:22px; font-weight:700; }
.stat-num.acc { color:var(--c-acc); }
.stat-num.run { color:var(--c-run); }
.stat-num.rest { color:var(--c-rest); }
.stat-num.leak { color:var(--c-leak); }
.stat-label { font-size:10px; color:var(--ink-light); margin-top:4px; letter-spacing:0.04em; }

/* ── 記錄頁 ── */
#input-area {
  background:var(--white); border-radius:12px; border:1px solid var(--sand);
  overflow:hidden; box-shadow:0 2px 12px rgba(44,32,24,0.06);
}
#input-box {
  width:100%; min-height:80px; padding:16px 18px 10px;
  border:none; outline:none; font-family:'Noto Sans TC',sans-serif;
  font-size:14px; line-height:1.7; color:var(--ink); background:transparent; resize:none;
}
#input-box::placeholder { color:var(--sand); }
#input-toolbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px; border-top:1px solid var(--rose-pale); background:#FDFAF8;
}
.quick-tags { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.qtag {
  padding:4px 10px; border-radius:20px; font-size:11px; cursor:pointer;
  border:1px solid transparent; transition:all 0.15s; white-space:nowrap;
}
.qtag[data-type="acc"] { background:rgba(77,139,122,0.1); color:var(--c-acc); border-color:rgba(77,139,122,0.2); }
.qtag[data-type="run"] { background:rgba(139,122,77,0.1); color:var(--c-run); border-color:rgba(139,122,77,0.2); }
.qtag[data-type="rest"] { background:rgba(77,107,139,0.1); color:var(--c-rest); border-color:rgba(77,107,139,0.2); }
.qtag[data-type="leak"] { background:rgba(139,77,77,0.1); color:var(--c-leak); border-color:rgba(139,77,77,0.2); }
.qtag:hover { opacity:0.75; }
.toolbar-right { display:flex; gap:8px; align-items:center; }
#btn-mic {
  width:32px; height:32px; border-radius:50%; border:1px solid var(--sand);
  background:transparent; cursor:pointer; display:flex; align-items:center;
  justify-content:center; font-size:14px; transition:all 0.15s; color:var(--ink-light);
}
#btn-mic:hover { border-color:var(--rose-light); color:var(--rose); }
#btn-mic.recording { background:var(--rose); color:#fff; border-color:var(--rose); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
#btn-send {
  padding:8px 18px; background:var(--rose); color:#fff; border:none;
  border-radius:6px; font-size:13px; font-family:'Noto Sans TC',sans-serif;
  cursor:pointer; display:flex; align-items:center; gap:6px;
  transition:background 0.18s; white-space:nowrap;
}
#btn-send:hover { background:var(--rose-dark); }
#btn-send.loading { opacity:0.6; pointer-events:none; }

#records-list { display:flex; flex-direction:column; gap:10px; max-height:400px; overflow-y:auto; padding-right:4px; }
#records-list::-webkit-scrollbar { width:4px; }
#records-list::-webkit-scrollbar-thumb { background:var(--sand); border-radius:2px; }
.record-card {
  background:var(--white); border-radius:10px; padding:14px 16px;
  border-left:3px solid var(--sand); box-shadow:0 1px 4px rgba(44,32,24,0.04);
  display:flex; gap:12px; align-items:flex-start; animation:slideIn 0.25s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.record-card[data-type="acc"] { border-left-color:var(--c-acc); }
.record-card[data-type="run"] { border-left-color:var(--c-run); }
.record-card[data-type="rest"] { border-left-color:var(--c-rest); }
.record-card[data-type="leak"] { border-left-color:var(--c-leak); }
.record-meta { flex:1; }
.record-text { font-size:13px; color:var(--ink); line-height:1.6; }
.record-info { display:flex; gap:8px; margin-top:6px; align-items:center; flex-wrap:wrap; }
.record-tag { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:500; }
.record-tag.acc { background:rgba(77,139,122,0.12); color:var(--c-acc); }
.record-tag.run { background:rgba(139,122,77,0.12); color:var(--c-run); }
.record-tag.rest { background:rgba(77,107,139,0.12); color:var(--c-rest); }
.record-tag.leak { background:rgba(139,77,77,0.12); color:var(--c-leak); }
.record-time { font-size:11px; color:var(--sand); font-family:'DM Mono',monospace; }
.record-hours { font-size:11px; color:var(--ink-light); }
.record-cal-badge {
  font-size:10px; padding:2px 7px; border-radius:10px;
  background:rgba(123,168,154,0.15); color:var(--mint); display:none;
}
.record-cal-badge.show { display:inline-block; }

/* Sheets link area */
#sheets-section {
  background:var(--white); border-radius:10px; padding:14px 16px;
  border:1px solid var(--sand); display:flex; align-items:center; gap:12px;
}
#sheets-section label { font-size:11px; color:var(--ink-light); white-space:nowrap; }
#sheets-url { flex:1; padding:7px 10px; border:1px solid var(--sand); border-radius:6px; font-size:11px; font-family:'DM Mono',monospace; color:var(--ink); outline:none; }
#btn-save-sheets { padding:7px 14px; background:var(--rose); color:#fff; border:none; border-radius:6px; font-size:12px; font-family:'Noto Sans TC',sans-serif; cursor:pointer; white-space:nowrap; }

/* ── Toast ── */
#toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:10px 20px; border-radius:8px;
  font-size:13px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999;
  white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.cal { background:var(--mint); }

/* mode badge */
.mode-badge {
  font-size:10px; padding:2px 8px; border-radius:10px;
  background:rgba(123,168,154,0.15); color:var(--mint);
}
.mode-badge.schedule { background:rgba(77,107,139,0.15); color:var(--c-rest); }

/* date nav */
#date-nav { display:flex; align-items:center; gap:10px; }
#date-nav button {
  padding:4px 10px; border:1px solid var(--sand); border-radius:6px;
  background:transparent; cursor:pointer; font-size:14px; color:var(--ink-light);
  transition:all 0.15s;
}
#date-nav button:hover { border-color:var(--rose-light); color:var(--rose); }
#date-display { font-size:13px; color:var(--ink); font-family:'DM Mono',monospace; min-width:90px; text-align:center; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>時間資產系統</h1>
    <p>Time Asset Manager</p>
  </div>
  <nav id="nav">
    <div class="nav-item active" data-page="today">
      <span class="nav-icon">📅</span>今日規劃
    </div>
    <div class="nav-item" data-page="record">
      <span class="nav-icon">✍️</span>記錄時間
    </div>
  </nav>
  <div id="key-section">
    <label>ANTHROPIC API KEY</label>
    <input type="password" id="key-input" placeholder="sk-ant-api03-...">
    <button id="btn-save-key">儲存金鑰</button>
    <div id="key-status">未設定</div>
  </div>
</div>

<div id="main">

  <!-- 今日規劃頁 -->
  <div class="page active" id="page-today">
    <div>
      <div class="page-title">今日規劃</div>
      <div class="page-subtitle" id="today-date-label">載入中...</div>
    </div>

    <div id="stats-row">
      <div class="stat-chip"><div class="stat-num acc" id="stat-acc">0h</div><div class="stat-label">蓄積型</div></div>
      <div class="stat-chip"><div class="stat-num run" id="stat-run">0h</div><div class="stat-label">運作型</div></div>
      <div class="stat-chip"><div class="stat-num rest" id="stat-rest">0h</div><div class="stat-label">休息型</div></div>
      <div class="stat-chip"><div class="stat-num leak" id="stat-leak">0h</div><div class="stat-label">漏損型</div></div>
    </div>

    <div id="today-grid">
      <!-- Google 日曆 -->
      <div class="today-card">
        <h3>
          <span>📅</span>Google 日曆行程
          <div id="date-nav" style="margin-left:auto">
            <button id="btn-prev-day">‹</button>
            <span id="date-display">今天</span>
            <button id="btn-next-day">›</button>
          </div>
          <button id="btn-refresh-cal">↻ 更新</button>
        </h3>
        <div id="cal-list">
          <div class="cal-empty">載入日曆中...</div>
        </div>
      </div>

      <!-- 快速新增行程 -->
      <div class="today-card">
        <h3><span>➕</span>新增行程到 Google 日曆</h3>
        <div id="quick-sched">
          <div class="sched-input-row">
            <input type="text" id="sched-title" placeholder="行程名稱">
          </div>
          <div class="sched-input-row">
            <input type="date" id="sched-date">
            <select id="sched-color">
              <option value="acc">蓄積型 🟢</option>
              <option value="run" selected>運作型 🟡</option>
              <option value="rest">休息型 🔵</option>
              <option value="leak">漏損型 🔴</option>
            </select>
          </div>
          <div class="sched-input-row">
            <input type="time" id="sched-start" placeholder="開始時間">
            <input type="time" id="sched-end" placeholder="結束時間">
          </div>
          <button id="btn-add-event">新增到日曆 →</button>
          <div id="sched-feedback"></div>
        </div>
      </div>
    </div>

    <!-- AI 自然語言排程 -->
    <div id="input-area">
      <textarea id="ai-sched-box" class="input-box" style="width:100%;min-height:70px;padding:16px 18px 10px;border:none;outline:none;font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.7;color:var(--ink);background:transparent;resize:none;" placeholder="用自然語言說行程，例如：「明天早上10點要開客戶會議兩小時」「後天下午3點到5點健身」"></textarea>
      <div id="input-toolbar">
        <div class="quick-tags">
          <span style="font-size:11px;color:var(--ink-light)">AI 自動排程</span>
        </div>
        <div class="toolbar-right">
          <button id="btn-ai-sched" style="padding:8px 18px;background:var(--c-rest);color:#fff;border:none;border-radius:6px;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:opacity 0.18s;">排進日曆 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 記錄時間頁 -->
  <div class="page" id="page-record">
    <div>
      <div class="page-title">記錄時間</div>
      <div class="page-subtitle">說出剛才做了什麼，AI 自動分類並存入 Sheets</div>
    </div>

    <div id="input-area">
      <textarea id="input-box" placeholder="例：剛才花了兩小時寫提案、開了一小時客戶會議、刷了半小時 IG..."></textarea>
      <div id="input-toolbar">
        <div class="quick-tags">
          <span class="qtag" data-type="acc">蓄積型</span>
          <span class="qtag" data-type="run">運作型</span>
          <span class="qtag" data-type="rest">休息型</span>
          <span class="qtag" data-type="leak">漏損型</span>
        </div>
        <div class="toolbar-right">
          <button id="btn-mic" title="語音輸入">🎤</button>
          <button id="btn-send">送出 ↵</button>
        </div>
      </div>
    </div>

    <div id="sheets-section">
      <label>Sheets URL</label>
      <input type="text" id="sheets-url" placeholder="Google Sheets 試算表網址">
      <button id="btn-save-sheets">儲存</button>
    </div>

    <div id="records-list"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── Config ──────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxsgkx0w9lW6rYKn4CI_MWn4wnVARpjqC6E7qeIBySkfDERi325ZDeuXbeq9j3y376v/exec';

// ── State ────────────────────────────────────
let apiKey = localStorage.getItem('tas_apikey') || '';
let sheetsUrl = localStorage.getItem('tas_sheets') || '';
let records = JSON.parse(localStorage.getItem('tas_records') || '[]');
let currentCalDate = getTodayISO(); // yyyy-MM-dd
let isRecording = false;
let recognition = null;

// ── Init ─────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // restore key & sheets
  if (apiKey) {
    document.getElementById('key-input').value = apiKey;
    document.getElementById('key-status').textContent = '✓ 已設定';
    document.getElementById('key-status').className = 'ok';
  }
  if (sheetsUrl) document.getElementById('sheets-url').value = sheetsUrl;

  // today label
  const now = new Date();
  document.getElementById('today-date-label').textContent =
    now.toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

  // set sched date default to today
  document.getElementById('sched-date').value = getTodayISO();

  // load calendar
  loadCalendar(currentCalDate);

  // render records
  renderRecords();
  updateStats();

  // nav
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      item.classList.add('active');
      document.getElementById('page-' + item.dataset.page).classList.add('active');
    });
  });

  // API key save
  document.getElementById('btn-save-key').addEventListener('click', () => {
    apiKey = document.getElementById('key-input').value.trim();
    localStorage.setItem('tas_apikey', apiKey);
    const st = document.getElementById('key-status');
    st.textContent = apiKey ? '✓ 已儲存' : '未設定';
    st.className = apiKey ? 'ok' : '';
    showToast('API Key 已儲存');
  });

  // Sheets save
  document.getElementById('btn-save-sheets').addEventListener('click', () => {
    sheetsUrl = document.getElementById('sheets-url').value.trim();
    localStorage.setItem('tas_sheets', sheetsUrl);
    showToast('Sheets 網址已儲存');
  });

  // send record
  document.getElementById('btn-send').addEventListener('click', handleRecord);
  document.getElementById('input-box').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleRecord(); }
  });

  // quick tags
  document.querySelectorAll('.qtag').forEach(tag => {
    tag.addEventListener('click', () => {
      const box = document.getElementById('input-box');
      const t = tag.dataset.type;
      const labels = {acc:'蓄積型',run:'運作型',rest:'休息型',leak:'漏損型'};
      box.value += (box.value ? ' ' : '') + '[' + labels[t] + '] ';
      box.focus();
    });
  });

  // mic
  document.getElementById('btn-mic').addEventListener('click', toggleMic);

  // calendar controls
  document.getElementById('btn-refresh-cal').addEventListener('click', () => loadCalendar(currentCalDate));
  document.getElementById('btn-prev-day').addEventListener('click', () => {
    currentCalDate = offsetDate(currentCalDate, -1);
    updateDateDisplay();
    loadCalendar(currentCalDate);
  });
  document.getElementById('btn-next-day').addEventListener('click', () => {
    currentCalDate = offsetDate(currentCalDate, 1);
    updateDateDisplay();
    loadCalendar(currentCalDate);
  });

  // add event form
  document.getElementById('btn-add-event').addEventListener('click', handleAddEvent);

  // AI schedule
  document.getElementById('btn-ai-sched').addEventListener('click', handleAiSchedule);
});

// ── Calendar ─────────────────────────────────
function updateDateDisplay() {
  const today = getTodayISO();
  const d = new Date(currentCalDate + 'T00:00:00');
  const label = currentCalDate === today ? '今天' :
    d.toLocaleDateString('zh-TW', {month:'numeric', day:'numeric', weekday:'short'});
  document.getElementById('date-display').textContent = label;
}

async function loadCalendar(dateStr) {
  const list = document.getElementById('cal-list');
  list.innerHTML = '<div class="cal-empty">載入中...</div>';
  try {
    const res = await fetch(GAS_URL + '?action=getEvents&date=' + dateStr);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || data.message);
    renderCalEvents(data.events);
    updateStats();
  } catch (e) {
    list.innerHTML = '<div class="cal-empty">⚠️ 無法讀取日曆：' + e.message + '</div>';
  }
}

function renderCalEvents(events) {
  const list = document.getElementById('cal-list');
  if (!events || events.length === 0) {
    list.innerHTML = '<div class="cal-empty">今天還沒有行程</div>';
    return;
  }
  list.innerHTML = events.map(ev => `
    <div class="cal-event">
      <div class="cal-time">${ev.start}–${ev.end}</div>
      <div class="cal-title">${ev.title}</div>
    </div>
  `).join('');
}

async function handleAddEvent() {
  const title = document.getElementById('sched-title').value.trim();
  const date = document.getElementById('sched-date').value;
  const start = document.getElementById('sched-start').value;
  const end = document.getElementById('sched-end').value;
  const color = document.getElementById('sched-color').value;

  if (!title || !date || !start || !end) {
    showToast('請填寫行程名稱、日期和時間');
    return;
  }

  const fb = document.getElementById('sched-feedback');
  fb.textContent = '新增中...';
  fb.style.color = 'var(--ink-light)';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'addEvent', title, date, startTime: start, endTime: end, color })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || data.message);
    fb.textContent = '✓ 已加入 Google 日曆！';
    fb.style.color = 'var(--mint)';
    showToast('行程已新增！', 'cal');
    // refresh if same date
    if (date === currentCalDate) loadCalendar(currentCalDate);
    // clear form
    document.getElementById('sched-title').value = '';
    document.getElementById('sched-start').value = '';
    document.getElementById('sched-end').value = '';
    setTimeout(() => { fb.textContent = ''; }, 3000);
  } catch (e) {
    fb.textContent = '⚠️ 新增失敗：' + e.message;
    fb.style.color = 'var(--c-leak)';
  }
}

// ── AI 自然語言排程 ──────────────────────────
async function handleAiSchedule() {
  const text = document.getElementById('ai-sched-box').value.trim();
  if (!text) return;
  if (!apiKey) { showToast('請先設定 API Key'); return; }

  const btn = document.getElementById('btn-ai-sched');
  btn.textContent = 'AI 解析中...';
  btn.style.opacity = '0.6';
  btn.style.pointerEvents = 'none';

  const today = getTodayISO();
  const todayLabel = new Date().toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: `今天是 ${todayLabel}（${today}）。

用戶說：「${text}」

請解析出行程資訊，只回傳 JSON，不要其他文字：
{
  "title": "行程名稱",
  "date": "yyyy-MM-dd",
  "startTime": "HH:mm",
  "endTime": "HH:mm",
  "color": "acc或run或rest或leak"
}

color 規則：學習/創作/個人成長 → acc；客戶/工作執行/會議 → run；休息/運動/娛樂 → rest；無效等待/分心 → leak。
如果時間不明確就用合理預設值。`
        }]
      })
    });

    const aiData = await res.json();
    const raw = aiData.content[0].text.trim();
    const json = JSON.parse(raw.replace(/```json|```/g, '').trim());

    // show parsed result in form
    document.getElementById('sched-title').value = json.title || '';
    document.getElementById('sched-date').value = json.date || today;
    document.getElementById('sched-start').value = json.startTime || '';
    document.getElementById('sched-end').value = json.endTime || '';
    document.getElementById('sched-color').value = json.color || 'run';

    // switch to today tab if needed
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-page="today"]').classList.add('active');
    document.getElementById('page-today').classList.add('active');

    showToast('AI 解析完成，請確認後按「新增到日曆」', 'cal');
    document.getElementById('ai-sched-box').value = '';

  } catch (e) {
    showToast('AI 解析失敗：' + e.message);
  } finally {
    btn.textContent = '排進日曆 →';
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
  }
}

// ── Record (existing) ────────────────────────
async function handleRecord() {
  const box = document.getElementById('input-box');
  const text = box.value.trim();
  if (!text) return;
  if (!apiKey) { showToast('請先設定 API Key'); return; }

  const btn = document.getElementById('btn-send');
  btn.classList.add('loading');
  btn.textContent = '分析中...';

  const now = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: `用戶記錄：「${text}」

只回傳 JSON，不要其他文字：
{
  "type": "acc或run或rest或leak",
  "hours": 數字,
  "summary": "10字內摘要"
}

分類：acc=學習/創作/個人成長；run=客戶工作/執行/會議；rest=休息/運動/娛樂；leak=無效等待/分心/浪費。
如果文字裡沒有時間資訊，hours 填 0。`
        }]
      })
    });

    const aiData = await res.json();
    const raw = aiData.content[0].text.trim();
    const json = JSON.parse(raw.replace(/```json|```/g, '').trim());

    const record = {
      id: Date.now(),
      text,
      type: json.type || 'run',
      hours: json.hours || 0,
      summary: json.summary || text.slice(0, 15),
      time: timeStr,
      date: getTodayISO()
    };

    records.unshift(record);
    localStorage.setItem('tas_records', JSON.stringify(records));
    renderRecords();
    updateStats();

    box.value = '';
    showToast('已記錄！');

    // write to Sheets
    if (sheetsUrl) writeToSheets(record);

  } catch (e) {
    showToast('分析失敗：' + e.message);
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '送出 ↵';
  }
}

function renderRecords() {
  const list = document.getElementById('records-list');
  const typeMap = {acc:'蓄積型',run:'運作型',rest:'休息型',leak:'漏損型'};
  if (records.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--sand);font-size:13px;padding:24px">還沒有記錄，說出你做了什麼吧</div>';
    return;
  }
  list.innerHTML = records.slice(0, 20).map(r => `
    <div class="record-card" data-type="${r.type}">
      <div class="record-meta">
        <div class="record-text">${r.text}</div>
        <div class="record-info">
          <span class="record-tag ${r.type}">${typeMap[r.type]}</span>
          ${r.hours > 0 ? `<span class="record-hours">${r.hours}h</span>` : ''}
          <span class="record-time">${r.time || ''}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function updateStats() {
  const today = getTodayISO();
  const todayRecs = records.filter(r => r.date === today);
  const sum = t => todayRecs.filter(r => r.type === t).reduce((a, r) => a + (r.hours || 0), 0);
  document.getElementById('stat-acc').textContent = sum('acc') + 'h';
  document.getElementById('stat-run').textContent = sum('run') + 'h';
  document.getElementById('stat-rest').textContent = sum('rest') + 'h';
  document.getElementById('stat-leak').textContent = sum('leak') + 'h';
}

async function writeToSheets(record) {
  if (!sheetsUrl) return;
  const sheetsId = sheetsUrl.match(/\/d\/([a-zA-Z0-9-_]+)/)?.[1];
  if (!sheetsId) return;
  const typeMap = {acc:'蓄積型',run:'運作型',rest:'休息型',leak:'漏損型'};
  const gasSheets = `https://script.google.com/macros/s/AKfycbxsgkx0w9lW6rYKn4CI_MWn4wnVARpjqC6E7qeIBySkfDERi325ZDeuXbeq9j3y376v/exec`;
  // for now just console log - sheets write would need separate GAS function
  console.log('Record to Sheets:', record);
}

// ── Mic ─────────────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('此瀏覽器不支援語音輸入');
    return;
  }
  if (isRecording) {
    recognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-TW';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('btn-mic').classList.add('recording');
  };
  recognition.onresult = e => {
    document.getElementById('input-box').value += e.results[0][0].transcript;
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('btn-mic').classList.remove('recording');
  };
  recognition.start();
}

// ── Helpers ──────────────────────────────────
function getTodayISO() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function offsetDate(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3000);
}
</script>
